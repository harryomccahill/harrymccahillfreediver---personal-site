name: Design Handoff → Claude Code

on:
  push:
    branches: [main]
    paths:
      - "design_handoff/latest/**"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write   # required: claude-code-action mints its GitHub token via OIDC
  actions: write    # required: the redispatch job calls `gh workflow run`

jobs:
  # claude-code-action does not support the `push` event, so a push to a handoff
  # bundle simply re-triggers this same workflow via workflow_dispatch (a supported
  # event), where the implement-handoff job below does the real work.
  redispatch:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Re-run as workflow_dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run design-handoff.yml --ref main

  implement-handoff:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code on the latest handoff
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true   # TEMP: diagnostics — revert after debugging
          prompt: |
            A new design handoff has been pushed to `design_handoff/latest/`.

            1. Read `design_handoff/latest/CHANGES.md` for the task summary and
               `design_handoff/latest/README.md` for the full implementation spec
               (exact colors, type, spacing, layout, interactions, state).
            2. The `.html` files in that folder are DESIGN REFERENCES only — do not
               ship them. Recreate the design in this codebase using its existing
               patterns (this is a static HTML/CSS site with small vanilla scripts).
            3. Use the specialised subagents in `.claude/agents/` where relevant.
            4. Match the spec pixel-for-pixel (it is high-fidelity unless the README
               says otherwise).
            5. Open a pull request with your implementation. Do NOT push to main directly.
          claude_args: |
            --max-turns 40
